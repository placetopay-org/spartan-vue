name: publish

on:
    workflow_dispatch:
        inputs:
            release-type:
                description: 'Release type'
                required: true
                type: choice
                options:
                    - prerelease
                    - patch
                    - minor
                    - major
                    - premajor
                    - preminor
                    - prepatch

permissions:
    id-token: write
    contents: write
    pages: write

jobs:
    # Gate. `workflow_dispatch` can be fired from any commit on the release
    # branch, including one whose CI never ran or ran red, so the release job
    # must depend on a green run rather than assume one happened.
    verify:
        name: Verify
        uses: ./.github/workflows/ci.yml

    release:
        name: Release
        needs: verify
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Git configuration
              run: |
                  git config --global user.email "${{ github.actor }}@users.noreply.github.com"
                  git config --global user.name "${{ github.actor }}"

            # Diagnostic, non-blocking. release-it's own pre-flight aborts with
            # "Not authenticated with npm" on this token, even though the token
            # publishes fine. Two candidate causes: the token cannot reach the
            # user-level /-/whoami endpoint (granular tokens cannot), or it never
            # reaches the `npm` that release-it spawns underneath `pnpm`.
            # Running whoami directly, with and without pnpm in between, tells
            # them apart. Remove this step once the answer is recorded.
            - name: Diagnose npm authentication
              continue-on-error: true
              run: |
                  echo "--- npm whoami (direct) ---"
                  npm whoami || echo "exit=$?"
                  echo "--- npm whoami (through pnpm, as release-it runs it) ---"
                  pnpm exec npm whoami || echo "exit=$?"
                  echo "--- token can read the package's collaborators? ---"
                  npm access list collaborators @placetopay/spartan-vue || echo "exit=$?"
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN_PLACETOPAY_DEV }}

            - name: Release (pre-release)
              if: startsWith(github.event.inputs.release-type, 'pre')
              run: pnpm release-it ${{ github.event.inputs.release-type }} --preRelease=beta --npm.tag=beta --ci
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN_PLACETOPAY_DEV }}

            - name: Release (stable)
              if: startsWith(github.event.inputs.release-type, 'pre') != true
              run: pnpm release-it ${{ github.event.inputs.release-type }} --ci
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN_PLACETOPAY_DEV }}

    deploy-docs:
        name: Deploy documentation
        needs: release
        uses: ./.github/workflows/deploy-docs.yml
