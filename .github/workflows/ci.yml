name: CI

on:
    pull_request:
    push:
        branches:
            - main
            - develop
            - 2.x
    workflow_dispatch:
    # Called by publish.yml, so a release can never run against a red tree.
    workflow_call:

concurrency:
    # `github.workflow` resolves to the *caller* on workflow_call, so a release
    # does not cancel the CI run already in flight for the same commit.
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        name: Verify (node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                # Node 20 is the floor declared by `engines.node`; 24 is what publishes.
                # Pull requests only exercise 24 — the prediction run is about whether the
                # merge is sound, not about Node compatibility. The floor is still verified
                # on every push to a long-lived branch and in the release gate, which is
                # where a Node 20 regression would actually matter.
                node: ${{ github.event_name == 'pull_request' && fromJSON('[24]') || fromJSON('[20, 24]') }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Typecheck
              run: pnpm run typecheck

            - name: Phantom dependencies
              run: pnpm run check:deps

            # Structural only — no coverage needed. Whether the generated coverage is
            # current is checked in sonar.yml, the one job that runs instrumentation.
            - name: Component status
              run: pnpm run check:status

            - name: Lint
              run: pnpm run lint:check

            - name: Format
              run: pnpm run format:check

            # Istanbul instrumentation is the single most expensive thing in this
            # workflow, and nothing consumes the lcov it produces — no job uploads it
            # to Sonar or anywhere else. Pull requests run the same 1009 tests without
            # it; pushes and the release gate keep coverage so the report still exists
            # for the branches it is read from.
            - name: Test
              run: ${{ github.event_name == 'pull_request' && 'pnpm run test:quick' || 'pnpm run test:ci' }}

            - name: Build
              run: pnpm run build

            - name: Validate published package
              run: pnpm dlx publint
