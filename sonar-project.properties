sonar.organization=placetopay
sonar.projectKey=placetopay_spartan-vue

# Analyse exactly what the coverage run measures, so the number Sonar reports and
# the number `pnpm run test:ci` produces cannot disagree.
#
# The previous configuration narrowed analysis to `*.vue`, hiding every `.ts` file
# in the components — which is where the real gaps were: `SToast/toast.ts` sat at
# 25% while `SToast.vue` was at 100%. It also excluded `api.ts`, all six of which
# are at 100%; that exclusion protected nothing and only removed code from view.
#
# Patterns are relative to the project base directory. The old ones carried a
# leading slash, which matches nothing.
sonar.sources=src/components/spartan
sonar.tests=src/components/spartan
sonar.test.inclusions=**/*.test.ts
# `.svg` appears in the coverage report because vite-svg-loader compiles icons into
# components. There is nothing for Sonar to analyse in them.
sonar.exclusions=**/*.test.ts,**/*.svg

# Produced by `pnpm run test:ci` (vitest + istanbul, lcov reporter). Paths inside
# the report are relative to the repository root.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
